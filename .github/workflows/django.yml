name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY != '' && secrets.DJANGO_SECRET_KEY || 'ci-dev-secret' }}
      DATABASE_NAME: db.sqlite3

    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          "${{ steps.setup-python.outputs.python-path }}" -m pip install --upgrade pip
          "${{ steps.setup-python.outputs.python-path }}" -m pip install -r requirements.txt
      - name: Run migrations
        run: |
          "${{ steps.setup-python.outputs.python-path }}" manage.py migrate --noinput
      - name: Run Django checks
        run: |
          "${{ steps.setup-python.outputs.python-path }}" manage.py check
      - name: Run tests
        run: |
          "${{ steps.setup-python.outputs.python-path }}" manage.py test
