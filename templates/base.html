<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Aspire Academy Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        academy: '#A30000',
                    },
                },
            },
        }
    </script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="bg-academy text-white shadow-sm">
        <div class="mx-auto flex flex-wrap max-w-7xl items-center justify-between gap-3 px-4 py-4 sm:px-6 lg:px-8">
            <div class="flex flex-wrap items-center gap-3">
                {% if request.path != '/' %}
                    <a href="/" aria-label="Go to home page" class="inline-flex items-center gap-2 rounded-full bg-white/15 px-3 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-white/25 focus:outline-none focus:ring-2 focus:ring-white/70">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
                            <path d="M3 11.25V5.25a.75.75 0 0 1 1.28-.53l6 6a.75.75 0 0 1 0 1.06l-6 6A.75.75 0 0 1 3 17.25v-6z" />
                            <path d="M10.5 6.75a.75.75 0 0 1 .75-.75h8.25a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75H11.25a.75.75 0 0 1-.75-.75V6.75z" />
                        </svg>
                        <span>Home</span>
                    </a>
                    <a href="#" aria-label="Go back" onclick="event.preventDefault(); if (history.length > 1) history.back(); else window.location.href='/';" class="inline-flex items-center gap-2 rounded-full bg-white/15 px-3 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-white/25 focus:outline-none focus:ring-2 focus:ring-white/70">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4 rotate-180">
                            <path d="M3 11.25V5.25a.75.75 0 0 1 1.28-.53l6 6a.75.75 0 0 1 0 1.06l-6 6A.75.75 0 0 1 3 17.25v-6z" />
                            <path d="M10.5 6.75a.75.75 0 0 1 .75-.75h8.25a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75H11.25a.75.75 0 0 1-.75-.75V6.75z" />
                        </svg>
                        <span>Back</span>
                    </a>
                {% endif %}
                <p class="text-lg font-semibold">Aspire Academy Portal</p>
            </div>
            {% if request.path != '/' %}
            <div class="text-sm">
                {% if request.user.is_authenticated %}
                    <span class="mr-4">{{ request.user.get_full_name|default:request.user.username }}</span>
                    <a href="{% url 'logout' %}" class="rounded-lg bg-white px-4 py-2 text-academy shadow-sm hover:bg-slate-100">Sign out</a>
                {% else %}
                    <a href="{% url 'login' %}" class="rounded-lg bg-white px-4 py-2 text-academy shadow-sm hover:bg-slate-100 mr-2">Login</a>
                    <a href="{% url 'signup' %}" class="rounded-lg bg-white px-4 py-2 text-academy shadow-sm hover:bg-slate-100">Sign up</a>
                {% endif %}
            </div>
            {% endif %}
        </div>
    </header>
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
