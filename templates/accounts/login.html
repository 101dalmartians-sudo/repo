{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-md rounded-3xl bg-white p-8 shadow-lg shadow-slate-200">
    <h1 class="text-3xl font-semibold text-slate-900">Sign in</h1>
    <p class="mt-2 text-slate-600">Access the student or teacher portal with your credentials.</p>

    {% if messages %}
        {% for message in messages %}
        <div class="mt-6 rounded-2xl border-l-4 border-red-600 bg-red-50 p-4 text-sm text-red-700">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" class="mt-8 space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-slate-700">Username</label>
            <input class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 focus:border-academy focus:outline-none focus:ring-2 focus:ring-academy/20" type="text" name="username" required autofocus>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700">Password</label>
            <input class="mt-2 w-full rounded-2xl border border-slate-300 bg-slate-50 px-4 py-3 focus:border-academy focus:outline-none focus:ring-2 focus:ring-academy/20" type="password" name="password" required>
        </div>
        <button type="submit" class="w-full rounded-2xl bg-academy px-4 py-3 text-white shadow-sm transition hover:bg-red-700">Login</button>
    </form>
</div>
{% endblock %}
