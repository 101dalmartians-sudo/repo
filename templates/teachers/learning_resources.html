{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-5xl space-y-6">
    <div class="rounded-3xl bg-white p-8 shadow-lg shadow-slate-200">
        <h1 class="text-3xl font-semibold text-slate-900">Learning Resources</h1>
        <p class="mt-2 text-slate-600">A quick launch area for reusable teacher materials and assignment-linked content.</p>
    </div>

    <div class="rounded-3xl bg-white p-8 shadow-lg shadow-slate-200">
        <h2 class="text-2xl font-semibold text-slate-900">Resource shortcuts</h2>
        <div class="mt-4 grid gap-4 md:grid-cols-2">
            <a href="{% url 'assignment_upload' %}" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 hover:border-academy">Upload assignment resources</a>
            <a href="{% url 'news_list' %}" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 hover:border-academy">Share resource announcements</a>
            <a href="{% url 'teachers_exams_workspace' %}" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 hover:border-academy">Attach exam instructions</a>
            <a href="{% url 'teachers_dashboard' %}" class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 hover:border-academy">Back to dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
