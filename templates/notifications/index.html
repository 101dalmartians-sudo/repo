{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-3xl rounded-2xl bg-white p-8 shadow">
  <h1 class="text-2xl font-semibold">Notifications</h1>
  {% if notifications %}
    <ul class="mt-4 space-y-2">
      {% for n in notifications %}
        <li class="border p-3 rounded">
          <strong>{{ n.title }}</strong>
          <div class="text-sm text-slate-600">{{ n.message }}</div>
          <div class="text-xs text-slate-500">{{ n.timestamp }}</div>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="mt-2 text-sm text-slate-600">No notifications.</p>
  {% endif %}
</div>
{% endblock %}
