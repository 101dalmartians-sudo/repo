{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-3xl rounded-3xl bg-white p-8 shadow-lg shadow-slate-200">
    <h1 class="text-3xl font-semibold text-slate-900">Upload Assignment</h1>
    {% if messages %}
        <div class="mt-4 space-y-4">
            {% for message in messages %}
            <div class="rounded-2xl border-l-4 border-amber-500 bg-amber-50 p-4 text-sm text-amber-800">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post" enctype="multipart/form-data" class="mt-8 space-y-5">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="rounded-2xl bg-academy px-5 py-3 text-white shadow-sm transition hover:bg-red-700">Upload assignment</button>
    </form>
</div>
{% endblock %}
